<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Deteksi Dini Diare{% endblock %} - Klinik Islamic Village</title>
    <meta name="description" content="{% block meta_description %}Sistem deteksi dini tingkat keparahan penyakit diare pada anak menggunakan algoritma Naïve Bayes.{% endblock %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 900: '#14532d' }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link { @apply flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors; }
        .sidebar-link:hover { @apply bg-gray-100 text-gray-900; }
        .sidebar-link.active { @apply bg-green-50 text-green-700; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-50 text-gray-900">
{% block body %}{% endblock %}
<script>
    lucide.createIcons();
    // Flash messages auto-dismiss
    setTimeout(() => {
        document.querySelectorAll('.flash-msg').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateX(100%)';
            setTimeout(() => el.remove(), 400);
        });
    }, 4000);
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
