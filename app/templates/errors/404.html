{% extends "layouts/base.html" %}
{% block title %}404 Tidak Ditemukan{% endblock %}
{% block body %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-xl p-8 max-w-md w-full text-center">
        <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-6 text-amber-600">
            <i data-lucide="file-question" class="w-8 h-8"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">404</h1>
        <p class="text-xl font-semibold text-gray-800 mb-2">Halaman Tidak Ditemukan</p>
        <p class="text-gray-500 mb-8">Maaf, halaman atau data yang Anda cari tidak dapat ditemukan di sistem.</p>
        <button onclick="window.history.back()" class="inline-flex items-center gap-2 bg-gray-900 text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:bg-gray-800 transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali
        </button>
    </div>
</div>
{% endblock %}
